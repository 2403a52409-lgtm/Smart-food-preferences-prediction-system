<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Food Preferences Prediction</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #333;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-top: 20px;
      padding: 10px;
      width: 100%;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #218838;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      background: #e9ecef;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Smart Food Preferences Predictor</h1>
    <form id="foodForm">
      <label for="age">Age:</label>
      <input type="number" id="age" name="age" required>

      <label for="activity">Activity Level:</label>
      <select id="activity" name="activity">
        <option value="low">Low</option>
        <option value="moderate">Moderate</option>
        <option value="high">High</option>
      </select>

      <label for="cuisine">Preferred Cuisine:</label>
      <select id="cuisine" name="cuisine">
        <option value="indian">Indian</option>
        <option value="italian">Italian</option>
        <option value="chinese">Chinese</option>
        <option value="mexican">Mexican</option>
      </select>

      <button type="button" onclick="predictFood()">Predict Preference</button>
    </form>

    <div class="result" id="result"></div>
  </div>

  <script>
    function predictFood() {
      const age = document.getElementById('age').value;
      const activity = document.getElementById('activity').value;
      const cuisine = document.getElementById('cuisine').value;
      let prediction = "";

      // Simple rule-based prediction logic
      if (activity === "high") {
        prediction = "You may prefer high-protein meals like grilled chicken or paneer.";
      } else if (activity === "moderate") {
        prediction = "Balanced meals with carbs and proteins, like pasta or biryani, suit you.";
      } else {
        prediction = "Light meals such as salads, soups, or rice dishes may be ideal.";
      }

      // Cuisine influence
      switch(cuisine) {
        case "indian":
          prediction += " Try dal, roti, and curry combinations.";
          break;
        case "italian":
          prediction += " Pasta and risotto could be great choices.";
          break;
        case "chinese":
          prediction += " Noodles and stir-fry dishes may fit your taste.";
          break;
        case "mexican":
          prediction += " Tacos and burritos could be enjoyable.";
          break;
      }

      document.getElementById('result').innerText = "Prediction: " + prediction;
    }
  </script>
</body>
</html>
